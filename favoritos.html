<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="src/css/estilos.css">
    <link rel="icon" type="image/png" href="Iconos/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="Iconos/favicon.svg" />
    <link rel="shortcut icon" href="Iconos/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="Iconos/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Swappit" />
    <link rel="manifest" href="manifest.json" />
    <title>Swappit</title>
</head>

<body>
    <header class="barraSuperior">
        <div class="barraSuperior_inner">
            <h1 class="marca">FAVORITOS</h1>
            <select name="selector" id="selectorPaginas" onchange="location.href=this.value">
                <option value="" selected disabled hidden>Sitios</option>
                <option value="index.html">Inicio</option>
                <option value="perfil.html">Perfil</option>
                <option value="misJuegos.html">Mis Juegos</option>
                <option value="chats.html">Chats</option>
                <option value="ayuda.html">Ayuda</option>
            </select>
        </div>
    </header>

    <main>
        <form class="form_favoritos" id="form_favoritos">
            <div class="div_juegosFav">
                <div class="cabListaJuegosFav">
                    <h2 class="tituloListaFavJuegos">Juegos Favoritos</h2>
                    <div class="botJuegosFav">
                        <button class="btn_eliminarJuegosFav" id="btn_eliminarJuegosFav" type="button">ELIMINAR JUEGO</button>
                        <button class="btn_eliminarTodoJuegosFav" id="btn_eliminarTodoJuegosFav"
                            style="display:none;" type="button">ELIMINAR TODO</button>
                        <button class="btn_cancelarJuegosFav" id="btn_cancelarJuegosFav"
                            style="display:none;" type="button">CANCELAR</button>
                    </div>
                </div>
                <div class="divlistaJuegosFav">
                    <ul class="listaJuegosFav" id="listaJuegosFav"></ul>
                </div>
            </div>
            <div class="div_perfilesFav">
                <div class="cabListaPerfilesFav">
                    <h2 class="tituloListaFavPerfil">Perfiles Favoritos</h2>
                    <div class="botPerfilesFav">
                        <button class="btn_eliminarPerfilesFav" id="btn_eliminarPerfilesFav" type="button">ELIMINAR PERFIL</button>
                        <button class="btn_eliminarTodoPerfilesFav" id="btn_eliminarTodoPerfilesFav"
                            style="display:none;" type="button">ELIMINAR TODO</button>
                        <button class="btn_cancelarPerfilesFav" id="btn_cancelarPerfilesFav"
                            style="display:none;" type="button">CANCELAR</button>
                    </div>
                </div>
                <div class="divlistaPerfilesFav">
                    <ul class="listaPerfilesFav" id="listaPerfilesFav"></ul>
                </div>
            </div>
        </form>
    </main>

</body>

<script type="module" src="src/js/main.js"></script>
<script type="module" src="src/js/favoritos.js"></script>

</html>
